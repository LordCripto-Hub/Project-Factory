services:
  provider-launch-gate:
    profiles: ["launcher"]
    image: ${MYPEOPLE_IMAGE:?set MYPEOPLE_IMAGE}
    user: mp
    network_mode: none
    restart: "no"
    entrypoint: ["/home/mp/mypeople/bin/mp"]
    command: ["providers-pause", "--reason", "launcher_bootstrap"]
    volumes:
      - mypeople-run:/home/mp/mypeople/run

  mypeople:
    image: ${MYPEOPLE_IMAGE:?set MYPEOPLE_IMAGE}
    container_name: mypeople
    hostname: node-1
    user: mp
    init: true
    restart: unless-stopped
    command: ["/home/mp/mypeople/bin/runtime-supervisor.sh"]
    environment:
      MYPEOPLE_MEMORY_COMPARISON_ENABLED: ${MYPEOPLE_MEMORY_COMPARISON_ENABLED:-0}
    tmpfs:
      - /run/mypeople-secrets:rw,noexec,nosuid,nodev,uid=1000,gid=1000,mode=0700
    ports:
      - "127.0.0.1:9900:9900"
      - "127.0.0.1:9933:9933"
      - "127.0.0.1:7681:7681"
      - "127.0.0.1:7682:7682"
      - "127.0.0.1:7699:7699"
    volumes:
      - type: bind
        source: ${MYPEOPLE_SEED_PATH:?set MYPEOPLE_SEED_PATH}
        target: /home/mp/mypeople.seed.md
        read_only: true
      - mypeople-todos:/home/mp/mypeople/todos
      - mypeople-run:/home/mp/mypeople/run
      - mypeople-status:/home/mp/mypeople/status
      - mypeople-config:/home/mp/.config/mypeople
      - mypeople-codex:/home/mp/.codex
      - mypeople-claude:/home/mp/.claude
      - mypeople-recordings:/home/mp/recordings
      - mypeople-workspaces:/home/mp/workspaces

volumes:
  mypeople-todos:
    name: mypeople-todos
  mypeople-run:
    name: mypeople-run
  mypeople-status:
    name: mypeople-status
  mypeople-config:
    name: mypeople-config
  mypeople-codex:
    name: mypeople-codex
  mypeople-claude:
    name: mypeople-claude
  mypeople-recordings:
    name: mypeople-recordings
  mypeople-workspaces:
    name: mypeople-workspaces
