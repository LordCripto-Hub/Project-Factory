<script>
'use strict';
const STATES=['needs_brainstorm','working','review','blocked','done','cancelled'];

const FILTER_KEY='mp_states_v2';function loadFilters(){try{const saved=JSON.parse(localStorage.getItem(FILTER_KEY)||localStorage.getItem('mp_states')||'null');if(!Array.isArray(saved)||!saved.every(x=>STATES.includes(x)))throw Error('stale');return new Set(saved)}catch{return new Set(STATES)}}function saveFilters(){localStorage.setItem(FILTER_KEY,JSON.stringify([...enabled]));localStorage.removeItem('mp_states')}let enabled=loadFilters(),view=localStorage.getItem('mp_view')||'all';
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
async function api(path,body){const o={credentials:'same-origin',cache:'no-store'};if(body!==undefined){o.method='POST';o.headers={'Content-Type':'application/json'};o.body=JSON.stringify(body)}const r=await fetch(path,o);let j={};try{j=await r.json()}catch{}if(!r.ok)throw new Error(j.error||`${r.status} ${path}`);return j}

function actionError(e){const labels={evidence_required:'Add evidence before closing this task.',verification_required:'The task needs verified review before closure.'};const msg=labels[e.message]||e.message;const s=$('#evidenceStatus');if(s)s.textContent=msg;else alert(msg)}function normTs(v){v=Number(v||0);return v>1e12?v/1000:v}
function ago(v){const d=Math.max(0,Date.now()/1000-normTs(v));if(d<5)return'just now';if(d<60)return`${Math.floor(d)}s ago`;if(d<3600)return`${Math.floor(d/60)}m ago`;if(d<86400)return`${Math.floor(d/3600)}h ago`;if(d<604800)return`${Math.floor(d/86400)}d ago`;return new Date(normTs(v)*1000).toLocaleDateString()}

function isAgent(s){return /^[^/\s]+\/[^:\s]+:[^\s]+$/.test(s||'')}
function initials(by){if(by==='CEO')return'CEO';let x=(by||'system').split(':').pop().replace(/[^A-Za-z0-9]/g,'');return (x.slice(0,2)||'SY').toUpperCase()}
function agentLink(a,text){const x=document.createElement('a');x.className='asg-link';x.href='/todo/terminal?agent='+encodeURIComponent(a);x.target='_blank';x.rel='noopener';x.textContent=text||a;x.dataset.agent=a;return x}
function safeMarkdownHref(href){try{const u=new URL(href,location.href);return /^https?:$/i.test(u.protocol)?String(href):''}catch{return''}}
function isDirectUrl(value){const url=safeMarkdownHref(String(value||'').trim());return url&&url===String(value||'').trim()?url:''}
function appendTextWithBreaks(parent,text){const parts=String(text).split('\n');parts.forEach((part,idx)=>{if(idx)parent.append(document.createElement('br'));if(part)parent.append(document.createTextNode(part))})}
function inline(parent,text){text=String(text||'');let i=0;const re=/(`[^`]+`|\*\*[^*]+\*\*|\*[^*]+\*|\[[^\]]+\]\([^)]+\)|https?:\/\/[^\s<]+)/g;for(const m of text.matchAll(re)){if(m.index>i)appendTextWithBreaks(parent,text.slice(i,m.index));const s=m[0];let el;if(s.startsWith('`')){el=document.createElement('code');el.textContent=s.slice(1,-1)}else if(s.startsWith('**')){el=document.createElement('strong');inline(el,s.slice(2,-2))}else if(s.startsWith('*')){el=document.createElement('em');inline(el,s.slice(1,-1))}else if(s.startsWith('[')){const z=s.match(/^\[([^\]]+)\]\(([^)]+)\)$/),url=safeMarkdownHref(z[2]);if(url){el=document.createElement('a');el.href=url;el.target='_blank';el.rel='noopener noreferrer';el.textContent=z[1]}else{el=document.createTextNode(s)}}else{const url=safeMarkdownHref(s);if(url){el=document.createElement('a');el.href=url;el.target='_blank';el.rel='noopener noreferrer';el.textContent=s}else el=document.createTextNode(s)}parent.append(el);i=m.index+s.length}if(i<text.length)appendTextWithBreaks(parent,text.slice(i))}
function renderMarkdown(target,source){const root=target||document.createElement('div'),lines=String(source||'').replaceAll('\r','').split('\n');if(target)target.replaceChildren();let i=0;while(i<lines.length){let l=lines[i];if(l.startsWith('```')){const lang=l.slice(3),buf=[];i++;while(i<lines.length&&!lines[i].startsWith('```'))buf.push(lines[i++]);i++;const pre=document.createElement('pre'),code=document.createElement('code');if(lang)code.className='language-'+lang.replace(/[^\w-]/g,'');code.textContent=buf.join('\n');pre.append(code);root.append(pre);continue}if(/^#{1,3}\s/.test(l)){const n=l.match(/^#+/)[0].length,h=document.createElement('h'+n);inline(h,l.slice(n).trim());root.append(h);i++;continue}if(l.startsWith('> ')){const q=document.createElement('blockquote');inline(q,l.slice(2));root.append(q);i++;continue}if(/^\s*[-*]\s+/.test(l)||/^\s*\d+\.\s+/.test(l)){const ordered=/^\s*\d/.test(l),list=document.createElement(ordered?'ol':'ul'),pat=ordered?/^\s*\d+\.\s+/:/^\s*[-*]\s+/;while(i<lines.length&&pat.test(lines[i])){const li=document.createElement('li');inline(li,lines[i].replace(pat,''));list.append(li);i++}root.append(list);continue}if(i+1<lines.length&&l.includes('|')&&/^\s*\|?\s*:?-+/.test(lines[i+1])){const table=document.createElement('table'),thead=document.createElement('thead'),tbody=document.createElement('tbody'),split=x=>x.replace(/^\||\|$/g,'').split('|').map(y=>y.trim()),heads=split(l),align=split(lines[i+1]);const tr=document.createElement('tr');heads.forEach((x,n)=>{const th=document.createElement('th');inline(th,x);const a=align[n]||'';th.style.textAlign=/^:-+:$/.test(a)?'center':/-+:$/.test(a)?'right':'left';tr.append(th)});thead.append(tr);i+=2;while(i<lines.length&&lines[i].includes('|')&&lines[i].trim()){const tr=document.createElement('tr');split(lines[i++]).forEach((x,n)=>{const td=document.createElement('td');inline(td,x);td.style.textAlign=thead.rows[0]?.cells[n]?.style.textAlign||'left';tr.append(td)});tbody.append(tr)}table.appe function evEl(tag,attrs={},text=''){const el=document.createElement(tag);for(const[k,v]of Object.entries(attrs||{})){if(v===false||v===null||v===undefined)continue;if(k==='class')el.className=v;else if(k==='text')el.textContent=v;else if(k in el)el[k]=v;else el.setAttribute(k,v)}if(text!==''&&text!==null&&text!==undefined)el.textContent=text;return el}
function markdown(src){const root=document.createElement('div');return renderMarkdown(root,src)}

function bytesLabel(n){n=Number(n||0);if(n<1024)return n+' B';if(n<1048576)return(n/1024).toFixed(1)+' KB';return(n/1048576).toFixed(1)+' MB'}
function proofNode(p){const row=document.createElement('div');row.className='event proof evidence-card';const av=document.createElement('div');av.className='av system';av.textContent='EV';const b=document.createElement('div');b.className='bubble';const head=document.createElement('div');head.className='ev-head';if(isAgent(p.by))head.append(agentLink(p.by,p.by));else head.append(document.createTextNode(p.by||'evidence'));head.append(document.createTextNode(' · '+ago(p.ts)));b.append(head);if(p.kind==='image'){const x=document.createElement('img');x.src=p.url;x.alt=p.filename||'image evidence';x.addEventListener('load',pinIfSticky);b.append(x)}else if(p.kind==='video'){const x=document.createElement('video');x.src=p.url;x.controls=true;x.addEventListener('loadeddata',pinIfSticky);b.append(x)}else if(p.kind==='link'){const x=document.createElement('a');x.href=p.url;x.target='_blank';x.rel='noopener noreferrer';x.textContent=p.url;b.append(x)}else if(p.kind==='file'){const x=document.createElement('a');x.className='evidence-file';x.href=p.url;x.download=p.filename||'artifact';const icon=document.createElement('strong');icon.textContent='↓ FILE';const label=document.createElement('span');label.textContent=p.filename||'Download artifact';x.append(icon,label);b.append(x)}else{const x=document.createElement('div');x.className='ev-text';x.append(markdown(p.body));b.append(x)}const meta=document.createElement('div');meta.className='evidence-meta';for(const value of [p.filename,p.mime,p.bytes!==undefined?bytesLabel(p.bytes):'',p.sha256?'sha256 '+p.sha256.slice(0,12):''])if(value){const s=document.createElement('span');s.textContent=value;meta.append(s)}b.append(meta);row.append(av,b);return row}function commentNode(c){const row=document.createElement('div');row.className='event';row.dataset.eventId=c.id||'';const av=document.createElement('div');av.className='av '+(c.by==='CEO'?'ceo':c.by==='system'?'system':'agent');av.textContent=initials(c.by);const b=document.createElement function openModal(id,clicked=false){const task=board.tasks[id];if(!task)return;openId=id;threadSig='';document.body.classList.add('modal-open');$('#modalTitle').textContent=task.text;$('#modalId').textContent=task.id;$('#editText').value=task.text;$('#doneCondition').value=task.doneCondition||'';$('#projectSlug').value=task.projectSlug||'';$('#contextQuestion').value=task.contextQuestion||'';$('#projectSlugOptions').replaceChildren(...(board.projectSlugs||[]).map(slug=>{const option=document.createElement('option');option.value=slug;return option}));$('#stateSelect').value=task.state;$('#evidencePolicy').value=task.evidencePolicy||'optional';$('#evidenceStatus').textContent=(task.proofs||[]).length+' evidence item(s) · drop or paste screenshots here';const owner=$('#ownerLine');owner.textContent=task.assignee||"unassigned";owner.replaceChildren(document.createTextNode('Owner: '),ownerNode(task.assignee,''),document.createTextNode(task.ownerNeedsReplacement?' · fresh owner pending':''));$('#ownerHistory').replaceChildren(...(task.ownerHistory||[]).map(historyLink));renderThread(task,true);const u=new URL(location.href);u.searchParams.set('task',id);history.pushState({task:id},'',u)}function closeModal(push=true){document.body.classList.remove('modal-open');openId='';threadSig='';if(push){const u=new URL(location.href);u.searchParams.delete('task');history.pushState({},'',u)}}
