<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MyPeople - Terminal Wall</title><style>
:root{--volt:#D5EF8A;--dark-bg:#111110;--text-dark:#F0F0E8;--muted-dark:rgba(240,240,232,.45);--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.15);--warning:#febc2e;--danger:#ff3b30;--mono:'DM Mono','SF Mono',monospace;--serif:'Instrument Serif',Georgia,serif}*{box-sizing:border-box}body{margin:0;background:var(--dark-bg);color:var(--text-dark);font-family:var(--mono)}header{padding:18px 22px;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#111110;z-index:3;border-bottom:1px solid var(--border)}h1{font:30px var(--serif);margin:0 auto 0 0}.filters button,.nav{border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--muted-dark);padding:7px 10px;text-decoration:none}.filters button.on{color:var(--volt);border-color:var(--volt)}#grid{padding:18px;display:flex;flex-wrap:wrap;align-items:flex-start;gap:16px}.tile{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden}.tile[data-state=working]{border-color:var(--warning)}.tile[data-state=blocked]{border-color:var(--danger)}.tile[data-state=idle]{opacity:.58;filter:saturate(.35)}.bar{height:32px;display:flex;align-items:center;gap:8px;padding:0 9px;font-size:10px}.bar .id{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}.dot{width:7px;height:7px;border-radius:50%;background:var(--volt)}[data-state=working] .dot{background:var(--warning)}[data-state=blocked] .dot{background:var(--danger)}.screen{position:relative;background:#000;padding:6px;overflow:hidden;cursor:pointer}.screen iframe{position:absolute;transform-origin:top left;border:0;background:#000}.watermark{display:none;position:absolute;right:10px;bottom:8px;color:rgba(255,255,255,.25);font-size:18px;z-index:2}[data-state=idle] .watermark{display:block}#offline{display:none;color:var(--danger)}#full{display:none;position:fixed;inset:0;background:#000;z-index:20}#full.open{display:block}#full iframe{width:100%;height:100%;border:0}#full button{position:absolute;right:14px;top:14px;z-index:2;background:var(--volt);border:0;border-radius:8px;padding:8px 12px}
</style><link rel="stylesheet" href="/assets/mypeople-ui.css"></head><body><header><h1>Terminal Wall</h1><span id="offline">metadata offline</span><div class="filters"><button data-filter="all" class="on">all</button><button data-filter="working">working</button><button data-filter="idle">idle</button></div><a class="nav" href="/">TODO</a><a class="nav" href="/terminal-graph">Graph</a></header><main id="grid"></main><div id="full"><button>Close</button><iframe title="interactive terminal"></iframe></div><script>
'use strict';const SCALE=.42,CW=9,CH=18,PAD=6,VIEW_COLS=120,VIEW_ROWS=36;let filter='all';const nodes=new Map(),$=s=>document.querySelector(s);
async function data(){const r=await fetch('/todo/wall',{credentials:'same-origin',cache:'no-store'});if(!r.ok)throw Error(r.status);return r.json()}
function termUrl(port,target){const u=new URL(`${location.protocol}//${location.hostname}:${port}/`);u.search=`?arg=-t&arg=${encodeURIComponent(target)}`;return u.href}
function make(x){const tile=document.createElement('article');tile.className='tile';tile.dataset.agentId=x.agent_id;const bar=document.createElement('div');bar.className='bar';bar.innerHTML='<span class="dot"></span><span class="id"></span><span class="state"></span>';const screen=document.createElement('div');screen.className='screen';const frame=document.createElement('iframe');frame.title=x.agent_id+' read-only terminal';frame.dataset.target=x.target;frame.src=termUrl(x.read_port,x.target);const wm=document.createElement('span');wm.className='watermark';wm.textContent='idle';screen.append(frame,wm);screen.onclick=()=>openFull(x);tile.append(bar,screen);$('#grid').append(tile);nodes.set(x.agent_id,{tile,bar,screen,frame,x});return nodes.get(x.agent_id)}
function update(n,x){n.x=x;n.tile.dataset.state=x.state;n.bar.querySelector('.id').textContent=x.agent_id;n.bar.querySelector('.state').textContent=x.state;const rawW=VIEW_COLS*CW,rawH=VIEW_ROWS*CH,w=Math.round(rawW*SCALE),h=Math.round(rawH*SCALE);n.screen.style.width=(w+PAD*2)+'px';n.screen.style.height=(h+PAD*2)+'px';n.frame.style.left=PAD+'px';n.frame.style.top=PAD+'px';n.frame.style.width=rawW+'px';n.frame.style.height=rawH+'px';n.frame.style.transform=`scale(${SCALE})`;n.tile.style.width=(w+PAD*2+2)+'px';apply(n)}
function apply(n){n.tile.hidden=filter!=='all'&&n.x.state!==filter}
function openFull(x){const f=$('#full');f.classList.add('open');f.querySelector('iframe').src=termUrl(x.write_port,x.target);f.dataset.target=x.target;document.body.dataset.terminalAgent=x.agent_id}$('#full button').onclick=()=>{const f=$('#full');f.classList.remove('open');f.querySelector('iframe').src='about:blank';delete document.body.dataset.terminalAgent};document.addEventListener('keydown',e=>{if(e.key==='Escape')$('#full button').click()});document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll('[data-filter]').forEach(x=>x.classList.toggle('on',x===b));nodes.forEach(apply)});
async function poll(){try{const rows=await data(),seen=new Set;for(const x of rows){seen.add(x.agent_id);const n=nodes.get(x.agent_id)||make(x);update(n,x)}for(const [id,n]of nodes)if(!seen.has(id)){n.tile.remove();nodes.delete(id)}const ordered=rows.map(x=>nodes.get(x.agent_id)?.tile).filter(Boolean);ordered.forEach(x=>$('#grid').append(x));$('#offline').style.display='none'}catch{$('#offline').style.display='inline'}}setInterval(poll,2500);poll();window.__wall={nodes,SCALE,poll,termUrl};
</script><script src="/assets/voice-dock.js" defer></script></body></html>
