<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MyPeople - Terminal Graph</title><style>
:root{--volt:#D5EF8A;--grove:#5e7a5e;--dark:#111110;--text:#F0F0E8;--muted:rgba(240,240,232,.45);--surface:rgba(255,255,255,.06);--border:rgba(255,255,255,.15);--warning:#febc2e;--danger:#ff3b30;--info:#5ac8fa;--mono:'DM Mono',monospace;--serif:'Instrument Serif',serif}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--text);font-family:var(--mono)}#viewport{position:absolute;inset:0;background-image:radial-gradient(rgba(213,239,138,.13) 1px,transparent 1px);background-size:24px 24px;cursor:grab}#viewport.panning{cursor:grabbing}#world{position:absolute;transform-origin:0 0;width:1px;height:1px}#edges{position:absolute;overflow:visible;pointer-events:none;z-index:0}.edge{fill:none;stroke:rgba(213,239,138,.38);stroke-width:2}.edge.task-edge{stroke:rgba(213,239,138,.24);stroke-dasharray:7 5}.node{position:absolute;background:#151514;border:1px solid var(--border);border-radius:11px;overflow:hidden;z-index:2}.node.master{border:2px solid var(--volt)}.node[data-state=working]{border-color:var(--warning)}.node[data-state=blocked]{border-color:var(--danger)}.node[data-state=idle]{opacity:.67;filter:saturate(.45)}.titlebar{height:28px;padding:0 8px;display:flex;align-items:center;gap:7px;font-size:9px;cursor:ew-resize;white-space:nowrap}.master .titlebar{color:var(--volt)}.dot{width:6px;height:6px;border-radius:50%;background:var(--volt)}[data-state=working] .dot{background:var(--warning)}[data-state=blocked] .dot{background:var(--danger)}.titlebar .name{overflow:hidden;text-overflow:ellipsis;flex:1}.screen{position:relative;padding:6px;background:#000;overflow:hidden;cursor:pointer}.screen iframe{position:absolute;border:0;transform-origin:top left;background:#000}.toolbar{position:fixed;top:14px;left:14px;right:14px;z-index:10;display:flex;gap:8px;align-items:center;pointer-events:none}.toolbar>*{pointer-events:auto}.toolbar h1{font:30px var(--serif);margin:0 auto 0 0}.toolbar button,.toolbar a,.toolbar se </style><link rel="stylesheet" href="/assets/mypeople-ui.css"></head><body><div id="viewport"><div id="world"><svg id="edges"></svg><section id="backlogZone"><h2>Backlog / unassigned</h2><div id="backlogList"></div></section></div></div><header class="toolbar"><h1>Terminal Graph</h1><span class="offline" id="offline">metadata offline</span><input id="newTask" placeholder="Create priority"><button class="accent" id="createTask">Create</button><button id="fit">Fit Fleet</button><button id="boss">Boss</button><a href="/">TODO</a><a href="/wall">Wall</a></header><nav class="filterbox" id="filters"></nav><div id="full"><button>Close</button><iframe title="interactive terminal"></iframe></div><div id="taskModal"><article class="panel"><header><h2 id="ptitle"></h2><button id="pclose">✕</button></header><div id="pid"></div><div id="powner"></div><div class="row"><input id="ptext" aria-label="Title"><input id="pdone" placeholder="Done condition"><select id="pstate"></select><button id="psave">Save</button><button id="pdelete" class="danger">Delete</button></div><div class="timeline" id="ptimeline"></div><div class="row"><textarea id="pcomment" placeholder="Comment or instruct…"></textarea><button id="ppost">Send</button><label class="action-link">Evidence<input id="pfile" type="file" multiple hidden></label><a id="pattach" class="action-link" target="_blank" rel="noopener">Owner terminal</a></div></article></div><script>
'use strict';const SCALE=.38,CW=9,CH=18,PAD=6,VIEW_COLS=120,VIEW_ROWS=36,POSKEY='mp_graph_x_v3';const agentNodes=new Map(),taskNodes=new Map();let graph={agents:[],edges:[],tasks:[]},board={tasks:{}},transform={x:innerWidth/2,y:100,z:1},drag=null,pan=null,openTask='',enabled=new Set(['needs_brainstorm','working','review','blocked','recurring','done','cancelled']);const $=s=>document.querySelector(s);
async function api(path,body){const o={credentials:'same-origin',cache:'no-store'};if(body!==undefined){o.method='POST';o.headers={'Content-Type':'application/json'};o.body=JSON.stringify(body)}const r=await fetch(path,o),j=await r.json();if(!r.ok)throw Error(j.error||r.status);return j}function term(port,target){const u=new URL(`${location.protocol}//${location.hostname}:${port}/`);u.search=`?arg=-t&arg=${encodeURIComponent(target)}`;return u.href}function applyWorld(){$('#world').style.transform=`translate(${transform.x}px,${transform.y}px) scale(${transform.z})`}
function makeAgent(a){const n=document.createElement('article');n.className='node';n.dataset.agentId=a.agent_id;const bar=document.createElement('div');bar.className='titlebar';bar.innerHTML='<span class="dot"></span><span class="name"></span><span class="state"></span>';const screen=document.createElement('div');screen.className='screen';const frame=document.createElement('iframe');frame.title=a.agent_id+' observer';frame.dataset.target=a.target;frame.src=term(a.read_port,a.target);screen.append(frame);screen.onclick=()=>openFull(a);bar.onpointerdown=e=>startDrag(e,a.agent_id);n.append(bar,screen);$('#world').append(n);const o={el:n,bar,screen,frame,a,x:0,y:0,w:0,h:0,depth:0};agentNodes.set(a.agent_id,o);return o}function updateAgent(o,a){o.a=a;o.el.classList.toggle('master',a.is_master);o.el.dataset.state=a.state;o.bar.querySelector('.name').textContent=a.agent_id;o.bar.querySelector('.state').textContent=a.state;const rw=VIEW_COLS*CW,rh=VIEW_ROWS*CH,w=Math.round(rw*SCALE),h=Math.round(rh*SCALE);o.screen.style.width=w+PAD*2+'px';o.screen.style.height=h+PAD*2+'px';o.frame.style.cssText=`left:${PAD}px;top:${PAD}px;width:${rw}px;height:${rh}px;transform:scale(${SCALE})`;o.w=w+PAD*2+2;o.h=h+PAD*2+30;o.el.style.width=o.w+'px'}
function depths(){const parent=new Map(graph.edges.map(e=>[e.child,e.parent])),memo=new Map();function d(id,seen=new Set){if(memo.has(id))return memo.get(id);const a=graph.agents.find(x=>x.agent_id===id);if(a?.is_master){memo.set(id,0);return 0}if(seen.has(id)){memo.set(id,1);return 1}seen.add(id);const p=parent.get(id),v=p&&agentNodes.has(p)?d(p,seen)+1:1;memo.set(id,v);return v}agentNodes.forEach((o,id)=>o.depth=d(id));return memo}
function layout(){depths();const saved=JSON.parse(localStorage.getItem(POSKEY)||'{}'),rows=new Map();agentNodes.forEach(o=>{if(!rows.has(o.depth))rows.set(o.depth,[]);rows.get(o.depth).push(o)});let y=0;const rowY={},rowMax={};[...rows.keys()].sort((a,b)=>a-b).forEach(dep=>{const arr=rows.get(dep).sort((a,b)=>(b.a.is_master-a.a.is_master)||a.a.agent_id.localeCompare(b.a.agent_id)),gap=70,total=arr.reduce((s,o)=>s+o.w,0)+gap*Math.max(0,arr.length-1);let x=-total/2;rowY[dep]=y;rowMax[dep]=Math.max(...arr.map(o=>o.h));for(const o of arr){o.x=o.a.is_master?-(o.w/2):(Number.isFinite(saved[o.a.agent_id])?saved[o.a.agent_id]:x);o.y=y;o.el.dataset.depth=dep;o.el.style.left=o.x+'px';o.el.style.top=o.y+'px';x+=o.w+gap}y+=rowMax[dep]+130});layoutTasks(rowY,rowMax,y);drawEdges();$('#backlogZone').style.left=(-650)+'px';$('#backlogZone').style.top='0px'}
function makeTask(t){const n=document.createElement('article');n.className='task-node';n.dataset.taskId=t.id;n.innerHTML='<span class="task-state"></span><div class="task-title"></div><div class="task-id"></div>';n.onclick=()=>openCard(t.id,true);taskNodes.set(t.id,n);return n}function updateTask(n,t){n.dataset.state=t.state;n.querySelector('.task-state').textContent=t.state;n.querySelector('.task-title').textContent=t.title;n.querySelector('.task-id').textContent=t.id;n.hidden=!enabled.has(t.state)}
function layoutTasks(rowY,rowMax,after){const byOwner=new Map();for(const t of graph.tasks){const n=taskNodes.get(t.id)||makeTask(t);updateTask(n,t);if(t.owner_live&&agentNodes.has(t.assignee)){if(!byOwner.has(t.assignee))byOwner.set(t.assignee,[]);byOwner.get(t.assignee).push({t,n})}else{$('#backlogList').append(n);n.classList.add('backlog-item');n.dataset.depth='backlog'}}for(const [owner,items] of byOwner){const o=agentNodes.get(owner),dep=o.depth+1,gap=14,total=items.length*240+(items.length-1)*gap,start=o.x+o.w/2-total/2;items.forEach(({t,n},i)=>{n.classList.remove('backlog-item');$('#world').append(n);n.dataset.depth=dep;n.style.left=(start+i*(240+gap))+'px';n.style.top=(o.y+o.h+45)+'px'})}}
function box(el){return{x:parseFloat(el.style.left)||0,y:parseFloat(el.style.top)||0,w:el.offsetWidth,h:el.offsetHeight}}function edgePath(a,b){return`M ${a.x+a.w/2} ${a.y+a.h} C ${a.x+a.w/2} ${(a.y+a.h+b.y)/2}, ${b.x+b.w/2} ${(a.y+a.h+b.y)/2}, ${b.x+b.w/2} ${b.y}`}
function drawEdges(){const svg=$('#edges');svg.replaceChildren();const all=[];for(const e of graph.edges){const p=agentNodes.get(e.parent),c=agentNodes.get(e.child);if(p&&c)all.push([box(p.el),box(c.el),false])}for(const t of graph.tasks){if(t.owner_live&&agentNodes.has(t.assignee)){const p=agentNodes.get(t.assignee),n=taskNodes.get(t.id);if(n&&!n.classList.contains('backlog-item'))all.push([box(p.el),box(n),true])}}for(const [a,b,task]of all){const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',edgePath(a,b));p.setAttribute('class','edge'+(task?' task-edge':''));svg.append(p)}const boxes=[...agentNodes.values()].map(o=>box(o.el));svg.style.left='-2000px';svg.style.top='-500px';svg.setAttribute('width','5000');svg.setAttribute('height','5000');svg.setAttribute('viewBox','-2000 -500 5000 5000')}
function startDrag(e,id){const o=agentNodes.get(id);if(o.a.is_master)return;e.stopPropagation();e.currentTarget.setPointerCapture(e.pointerId);drag={id,start:e.clientX,x:o.x};e.currentTarget.onpointermove=moveDrag;e.currentTarget.onpointerup=endDrag}function moveDrag(e){if(!drag)return;const o=agentNodes.get(drag.id);o.x=drag.x+(e.clientX-drag.start)/transform.z;o.el.style.left=o.x+'px';drawEdges()}function endDrag(e){if(!drag)return;const saved=JSON.parse(localStorage.getItem(POSKEY)||'{}');saved[drag.id]=agentNodes.get(drag.id).x;localStorage.setItem(POSKEY,JSON.stringify(saved));drag=null;e.currentTarget.onpointermove=null;e.currentTarget.onpointerup=null}
const vp=$('#viewport');vp.onpointerdown=e=>{if(e.target!==vp)return;pan={x:e.clientX,y:e.clientY,tx:transform.x,ty:transform.y};vp.classList.add('panning');vp.setPointerCapture(e.pointerId)};vp.onpointermove=e=>{if(pan){transform.x=pan.tx+e.clientX-pan.x;transform.y=pan.ty+e.clientY-pan.y;applyWorld()}};vp.onpointerup=()=>{pan=null;vp.classList.remove('panning')};vp.onwheel=e=>{e.preventDefault();const old=transform.z,n=Math.max(.2,Math.min(2,old*Math.exp(-e.deltaY*.001)));transform.x=e.clientX-(e.clientX-transform.x)*n/old;transform.y=e.clientY-(e.clientY-transform.y)*n/old;transform.z=n;applyWorld()};
function bounds(){const xs=[...agentNodes.values()].map(o=>box(o.el));for(const n of taskNodes.values())if(!n.hidden&&!n.classList.contains('backlog-item'))xs.push(box(n));xs.push(box($('#backlogZone')));if(!xs.length)return{x:0,y:0,w:1,h:1};const l=Math.min(...xs.map(x=>x.x)),t=Math.min(...xs.map(x=>x.y)),r=Math.max(...xs.map(x=>x.x+x.w)),b=Math.max(...xs.map(x=>x.y+x.h));return{x:l,y:t,w:r-l,h:b-t}}function fit(){const b=bounds(),pad=90,z=Math.min(1,(innerWidth-pad*2)/b.w,(innerHeight-pad*2)/b.h);transform={z,x:pad-b.x*z,y:pad-b.y*z};applyWorld()}function centerBoss(){const o=[...agentNodes.values()].find(x=>x.a.is_master);if(!o)return;transform.z=Math.max(transform.z,.7);transform.x=innerWidth/2-(o.x+o.w/2)*transform.z;transform.y=90-o.y*transform.z;applyWorld()}$('#fit').onclick=fit;$('#boss').onclick=centerBoss;
function openFull(a){const f=$('#full');f.classList.add('open');f.dataset.target=a.target;f.querySelector('iframe').src=term(a.write_port,a.target);document.body.dataset.terminalAgent=a.agent_id}$('#full button').onclick=()=>{$('#full').classList.remove('open');$('#full iframe').src='about:blank';delete document.body.dataset.terminalAgent};
async function poll(){try{[graph,board]=await Promise.all([api('/todo/terminal-graph'),api('/todo/board')]);const seen=new Set;for(const a of graph.agents){seen.add(a.agent_id);updateAgent(agentNodes.get(a.agent_id)||makeAgent(a),a)}for(const[id,o]of agentNodes)if(!seen.has(id)){o.el.remove();agentNodes.delete(id)}const ts=new Set(graph.tasks.map(t=>t.id));for(const[id,n]of taskNodes)if(!ts.has(id)){n.remove();taskNodes.delete(id)}layout();$('#offline').style.display='none';if(openTask&&board.tasks[openTask])renderCard(board.tasks[openTask])}catch{$('#offline').style.display='inline'}}
for(const s of ['needs_brainstorm','working','review','blocked','recurring','done','cancelled']){const b=document.createElement('button');b.textContent=s;b.className='on';b.dataset.state=s;b.onclick=()=>{enabled.has(s)?enabled.delete(s):enabled.add(s);b.classList.toggle('on',enabled.has(s));taskNodes.forEach((n,id)=>n.hidden=!enabled.has(graph.tasks.find(t=>t.id===id)?.state));drawEdges()};$('#filters').append(b)}
function renderCard(t){const isAgent=a=>/^[^/\s]+\/[^:\s]+:[^\s]+$/.test(a||'');const alink=(a,label=a)=>{const x=document.createElement('a');x.className='asg-link';x.href='/todo/terminal?agent='+encodeURIComponent(a);x.target='_blank';x.rel='noopener';x.textContent=label;return x};$('#ptitle').textContent=t.text;$('#pid').textContent=t.id;$('#ptext').value=t.text;$('#pdone').value=t.doneCondition||'';$('#pstate').value=t.state;const own=$('#powner');own.replaceChildren(document.createTextNode('Owner: '),isAgent(t.assignee)?alink(t.assignee):document.createTextNode(t.assignee||'unassigned'));const attach=$('#pattach');if(isAgent(t.assignee)){attach.href='/todo/terminal?agent='+encodeURIComponent(t.assignee);attach.removeAttribute('aria-disabled')}else{attach.removeAttribute('href');attach.setAttribute('aria-disabled','true')};for(const ev of t.ownerHistory||[]){own.append(document.createElement('br'),document.createTextNode(`${ev.kind}: `));if(isAgent(ev.agent_id))own.append(alink(ev.agent_id));else own.append(document.createTextNode(ev.agent_id||''));if(ev.previous){own.append(document.createTextNode(' · previous '));own.append(isAgent(ev.previous)?alink(ev.previous):document.createTextNode(ev.previous))}}const items=[...(t.comments||[]).map(x=>({...x,type:'comment'})),...(t.proofs||[]).map(x=>({...x,type:'proof'}))].sort((a,b)=>(a.ts>1e12?a.ts/1000:a.ts)-(b.ts>1e12?b.ts/1000:b.ts));const tl=$('#ptimeline');tl.replaceChildren();for(const x of items){const d=document.createElement('div');d.className='item'+(x.type==='proof'?' evidence-card':'');if(x.type==='comment'){if(isAgent(x.by))d.append(alink(x.by),document.createTextNode(': '+x.body));else d.textContent=`${x.by}: ${x.body}`}else if(x.kind==='image'){const im=document.createElement('img');im.src=x.url;d.append(im)}else if(x.kind==='video'){const v=document.createElement('video');v.src=x.url;v.controls=true;d.append(v)}else if(x.kind==='link'){const a=document.createElement('a');a.href=x.url;a.target='_blank';a.rel='noopener noreferrer';a.textContent=x.url;d.append(a)}else if(x.kind==='file'){const a=document.createElement('a');a.href=x.url;a.download=x.filename||'artifact';a.className='evidence-file';a.textContent='↓ FILE · '+(x.filename||'artifact');d.append(a)}else d.textContent=x.body;if(x.type==='proof'&&(x.filename||x.mime)){const m=document.createElement('div');m.className='evidence-meta';m.textContent=[x.filename,x.mime,x.bytes?x.bytes+' B':'',x.sha256?'sha256 '+x.sha256.slice(0,12):''].filter(Boolean).join(' · ');d.append(m)};tl.append(d)}}
function openCard(id,push=false){const t=board.tasks[id];if(!t)return;openTask=id;$('#taskModal').classList.add('open');renderCard(t);if(push){const u=new URL(location.href);u.searchParams.set('task',id);history.pushState({task:id},'',u)}}function closeCard(push=true){openTask='';$('#taskModal').classList.remove('open');if(push){const u=new URL(location.href);u.searchParams.delete('task');history.pushState({},'',u)}}$('#pclose').onclick=()=>closeCard();$('#taskModal').onclick=e=>{if(e.target===$('#taskModal'))closeCard()};$('#psave').onclick=async()=>{await api('/todo/update',{op:'set',id:openTask,text:$('#ptext').value,doneCondition:$('#pdone').value,state:$('#pstate').value,by:'CEO'});await poll()};$('#pdelete').onclick=async()=>{if(confirm('Delete task?')){await api('/todo/update',{op:'del',id:openTask});closeCard();await poll()}};$('#ppost').onclick=async()=>{const x=$('#pcomment');if(x.value.trim()){await api('/todo/comment',{task_id:openTask,by:'CEO',body:x.value.trim()});x.value='';await poll()}};$('#pfile').onchange=async e=>{for(const file of e.target.files){const form=new FormData();form.append('task_id',openTask);form.append('by','CEO');form.append('file',file,file.name);const r=await fetch('/todo/proof',{method:'POST',credentials:'same-origin',body:form});if(!r.ok)throw new Error((await r.json()).error||'upload_failed')}e.target.value='';await poll()};$('#createTask').onclick=async()=>{const x=$('#newTask');if(x.value.trim()){await api('/todo/update',{op:'add',text:x.value.trim(),by:'CEO',test:new URL(location.href).searchParams.has('verify')});x.value='';await poll()}};window.onpopstate=()=>{const id=new URL(location.href).searchParams.get('task');id?openCard(id):closeCard(false)};document.addEventListener('keydown',e=>{if(e.key==='Escape'){$('#full').classList.contains('open')?$('#full button').click():closeCard()}});applyWorld();setInterval(poll,2500);poll().then(()=>{fit();const id=new URL(location.href).searchParams.get('task');if(id)openCard(id)});
