<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MyPeople - HUD</title><style>
:root{--midnight:#01000A;--volt:#D5EF8A;--grove:#5e7a5e;--iris:#C4BFFF;--dark-bg:#111110;--text-dark:#F0F0E8;--muted-dark:rgba(240,240,232,0.45);--surface:rgba(255,255,255,0.05);--surface2:rgba(255,255,255,0.08);--dark-border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.15);--volt-dim:rgba(213,239,138,0.15);--volt-glow:rgba(213,239,138,0.25);--success:#34c759;--danger:#ff3b30;--warning:#febc2e;--info:#5ac8fa;--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--mono:'DM Mono','SF Mono',monospace}*{box-sizing:border-box}body{margin:0;background:var(--dark-bg);color:var(--text-dark);font-family:var(--sans)}.wrap{max-width:1500px;margin:auto;padding:42px 25px}h1{font:400 38px var(--serif);margin:0}.top{display:flex;justify-content:space-between;gap:15px;align-items:end}.meta{font:12px var(--mono);color:var(--muted-dark);text-transform:uppercase;margin-top:6px}.nav{color:var(--volt);font:12px var(--mono);text-transform:uppercase}section{margin-top:30px;background:var(--surface);border:1px solid var(--dark-border);border-radius:18px;overflow:hidden}h2{font:400 26px var(--serif);margin:18px 20px}table{border-collapse:collapse;width:100%}th,td{padding:12px 14px;border-top:1px solid var(--dark-border);vertical-align:top;text-align:left}th{font:10px var(--mono);letter-spacing:.08em;color:var(--muted-dark)}td{font-size:14px}.aid,.cmd{font:12px var(--mono)}.cmd{display:block;max-width:430px;white-space:pre-wrap;word-break:break-all;color:var(--muted-dark)}.state.alive{color:var(--volt)}.status{display:inline-flex;border-radius:100px;padding:4px 8px;font:10px var(--mono);text-transform:uppercase}.status.working{color:var(--warning);background:rgba(254,188,46,.18)}.status.idle{color:var(--muted-dark);background:var(--surface)}.status.blocked{color:var(--danger);background:rgba(255,59,48,.16)}.status.ready{color:var(--volt);background:var(--volt-dim)}.attach,.revive,.copy{display:inline-block;border:0;border-radius:9px;padding:7px 10px;background:var(--volt);color:var(--midnight);font:700 11px var(--mono);text-decoration:none;cursor:pointer}.copy{padding:3px 6px;margin-left:6px;background:var(--surface2);color:var(--volt)}.empty{padding:20px;color:var(--muted-dark)}@media(max-width:900px){.tablewrap{overflow:auto}table{min-width:1000px}}
</style><link rel="stylesheet" href="/assets/mypeople-ui.css"></head><body><main class="wrap"><header class="top"><div><h1>MyPeople - HUD</h1><div class="meta"><span id="count">0 agents</span> · refreshed <span id="refreshed">—</span> · <span id="live">live</span></div></div><a class="nav" href="/">TODO ↗</a></header><section><h2>Agents</h2><div class="tablewrap"><table id="agentsTable"><thead><tr><th>AGENT_ID</th><th>STATE</th><th>STATUS</th><th>BACKEND</th><th>BOSS</th><th>SUMMARY</th><th>SPAWN CMD</th><th>ATTACH</th></tr></thead><tbody></tbody></table></div></section><section><h2>Retired engineers</h2><p id="reviveNotice" class="meta" role="status" aria-live="polite"></p><div class="tablewrap"><table id="retiredTable"><thead><tr><th>AGENT_ID</th><th>SUMMARY</th><th>SPAWN CMD</th><th>REVIVE</th></tr></thead><tbody></tbody></table></div></section></main><script>
'use strict';const $=s=>document.querySelector(s);let agents=[],roster=[];
async function get(p,o){const r=await fetch(p,{credentials:'same-origin',cache:'no-store',...(o||{})});const j=await r.json();if(!r.ok){const e=Error(j.error||r.status);e.result=j.result;throw e}return j}
function el(tag,cls,text){const x=document.createElement(tag);if(cls)x.className=cls;if(text!==undefined)x.textContent=text;return x}
function reviveMessage(result){const detail=String(result?.result||'').trim();if(result?.ok)return 'Revive requested. Refreshing live session status.';if(detail.includes('owner_task_closed'))return 'Cannot revive this engineer: its owner task is closed or deleted.';if(detail.includes('owner_task_unassigned'))return 'Cannot revive this engineer: its owner task has no current owner.';if(detail.includes('owner_task_reassigned'))return 'Cannot revive this engineer: its owner task was reassigned.';if(detail.includes('agent_already_alive'))return 'This engineer is already alive.';if(detail.includes('agent_revive_in_progress'))return 'Revive is already in progress for this engineer.';return detail||'Revive was rejected by the runtime.'}
function showRevive(result){const n=$('#reviveNotice');n.textContent=reviveMessage(result);n.style.color=result?.ok?'var(--success)':'var(--danger)'}
function cmdCell(row){const td=el('td'),s=el('code','cmd',row.spawn_cmd||'');s.title=row.spawn_cmd||'';const c=el('button','copy','copy');c.onclick=()=>navigator.clipboard?.writeText(row.spawn_cmd||'');const rev=el('code','cmd',row.revive_cmd||('mp revive '+row.agent_id));td.append(s,c,rev);return td}
function attachUrl(a){return '/todo/terminal?agent='+encodeURIComponent(a.agent_id)}
function render(){const tb=$('#agentsTable tbody');tb.replaceChildren();for(const a of agents){const tr=el('tr');tr.dataset.agentId=a.agent_id;tr.append(el('td','aid',a.agent_id),el('td','state '+a.state,a.state),(()=>{const td=el('td');td.append(el('span','status '+(a.status||'ready'),a.status||'ready'));return td})(),el('td','',a.backend||''),el('td','aid',a.boss_id||'—'),el('td','',a.summary||''),cmdCell(a));const at=el('td'),url=attachUrl(a);if(url){const x=el('a','attach','ATTACH');x.href=url;x.target='_blank';x.rel='noopener noreferrer';at.append(x)}tr.append(at);tb.append(tr)}if(!agents.length){const tr=el('tr');const td=el('td','empty','No live agents');td.colSpan=8;tr.append(td);tb.append(tr)}const rt=$('#retiredTable tbody');rt.replaceChildren();for(const r of roster.filter(x=>x.retired)){const tr=el('tr');tr.dataset.agentId=r.agent_id;tr.append(el('td','aid',r.agent_id),el('td','',r.summary||''),cmdCell(r));const td=el('td'),b=el('button','revive','Revive');b.onclick=async()=>{b.disabled=true;try{showRevive(await get('/revive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent_id:r.agent_id})}));}catch(error){showRevive({ok:false,result:error.result||error.message})}finally{b.disabled=false;await poll()}};td.append(b);tr.append(td);rt.append(tr)}if(!rt.children.length){const tr=el('tr'),td=el('td','empty','No retired engineers');td.colSpan=4;tr.append(td);rt.append(tr)}$('#count').textContent=`${agents.length} agent${agents.length===1?'':'s'}`;$('#refreshed').textContent=new Date().toLocaleTimeString()}
async function poll(){try{[agents,roster]=await Promise.all([get('/agents'),get('/roster')]);$('#live').textContent='live';render()}catch{$('#live').textContent='stale'}}setInterval(poll,2500);poll();window.__hud={poll,get agents(){return agents},get roster(){return roster}};
</script><script src="/assets/voice-dock.js" defer></script></body></html>
